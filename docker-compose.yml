version: "3.9"

# ══════════════════════════════════════════════════════════════════════════════
#  CONNECTONGS — Docker Compose
#
#  Modelo baseado no academic_v3:
#    - 4 nós Python com servidor TCP + RPC entre nós
#    - Nginx como load balancer (porta 8080)
#    - Manager monitorando todos os nós (porta 9000)
#    - Rede isolada 172.30.0.0/24
#    - Cada nó tem IP fixo e volume próprio
# ══════════════════════════════════════════════════════════════════════════════

networks:
  connectongs_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  data_n1:
  data_n2:
  data_n3:
  data_n4:

services:

  # ── Nó 1  IP: 172.30.0.10 ─────────────────────────────────────────────────
  node1:
    build: .
    container_name: conn_node1
    hostname: node1
    environment:
      NODE_ID:   node1
      RPC_PORT:  "9100"
      PEER_NODES: >-
        node2=172.30.0.11:9100,
        node3=172.30.0.12:9100,
        node4=172.30.0.13:9100
    volumes: ["data_n1:/data"]
    networks:
      connectongs_net:
        ipv4_address: 172.30.0.10
    ports:
      - "8081:8080"
      - "9101:9100"
    restart: unless-stopped

  # ── Nó 2  IP: 172.30.0.11 ─────────────────────────────────────────────────
  node2:
    build: .
    container_name: conn_node2
    hostname: node2
    environment:
      NODE_ID:   node2
      RPC_PORT:  "9100"
      PEER_NODES: >-
        node1=172.30.0.10:9100,
        node3=172.30.0.12:9100,
        node4=172.30.0.13:9100
    volumes: ["data_n2:/data"]
    networks:
      connectongs_net:
        ipv4_address: 172.30.0.11
    ports:
      - "8082:8080"
      - "9102:9100"
    restart: unless-stopped

  # ── Nó 3  IP: 172.30.0.12 ─────────────────────────────────────────────────
  node3:
    build: .
    container_name: conn_node3
    hostname: node3
    environment:
      NODE_ID:   node3
      RPC_PORT:  "9100"
      PEER_NODES: >-
        node1=172.30.0.10:9100,
        node2=172.30.0.11:9100,
        node4=172.30.0.13:9100
    volumes: ["data_n3:/data"]
    networks:
      connectongs_net:
        ipv4_address: 172.30.0.12
    ports:
      - "8083:8080"
      - "9103:9100"
    restart: unless-stopped

  # ── Nó 4  IP: 172.30.0.13 ─────────────────────────────────────────────────
  node4:
    build: .
    container_name: conn_node4
    hostname: node4
    environment:
      NODE_ID:   node4
      RPC_PORT:  "9100"
      PEER_NODES: >-
        node1=172.30.0.10:9100,
        node2=172.30.0.11:9100,
        node3=172.30.0.12:9100
    volumes: ["data_n4:/data"]
    networks:
      connectongs_net:
        ipv4_address: 172.30.0.13
    ports:
      - "8084:8080"
      - "9104:9100"
    restart: unless-stopped

  # ── Load Balancer Nginx  IP: 172.30.0.5 ───────────────────────────────────
  loadbalancer:
    image: nginx:alpine
    container_name: conn_lb
    depends_on: [node1, node2, node3, node4]
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      connectongs_net:
        ipv4_address: 172.30.0.5
    ports:
      - "8080:80"
    restart: unless-stopped

  # ── Manager / Painel  IP: 172.30.0.2 ──────────────────────────────────────
  manager:
    build:
      context: .
      dockerfile: docker/Dockerfile.manager
    container_name: conn_manager
    environment:
      NODES: >-
        http://172.30.0.10:8080,
        http://172.30.0.11:8080,
        http://172.30.0.12:8080,
        http://172.30.0.13:8080
      RPC_NODES: >-
        172.30.0.10:9100,
        172.30.0.11:9100,
        172.30.0.12:9100,
        172.30.0.13:9100
      CHECK_INTERVAL: "10"
    networks:
      connectongs_net:
        ipv4_address: 172.30.0.2
    ports:
      - "9000:9000"
    restart: unless-stopped
